# Name of your application. Used to uniquely configure containers.
service: lighthouse

# Name of the container image.
image: your-dockerhub-user/lighthouse

# Deploy to these servers (replace with your actual server IPs).
servers:
  web:
    - 192.168.0.1
  job:
    hosts:
      - 192.168.0.1
    cmd: bin/jobs

# Enable SSL auto certification via Let's Encrypt.
proxy:
  ssl: true
  host: lighthouse.example.com

# Container registry (replace with your registry).
registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Environment variables injected into containers.
env:
  secret:
    - RAILS_MASTER_KEY
    - LIGHTHOUSE_DATABASE_PASSWORD
    - TBA_API_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: lighthouse-db
    RAILS_LOG_LEVEL: info
    RAILS_SERVE_STATIC_FILES: true
    WEB_CONCURRENCY: 2
    JOB_CONCURRENCY: 3

# Aliases for common commands.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage for Active Storage and SQLite-backed Solid services.
volumes:
  - "lighthouse_storage:/rails/storage"

# Bridge assets between deployments.
asset_path: /rails/public/assets

# Build configuration.
builder:
  arch: amd64

# PostgreSQL accessory.
accessories:
  db:
    image: postgres:18
    host: 192.168.0.1
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: lighthouse_production
        POSTGRES_USER: lighthouse
      secret:
        - LIGHTHOUSE_DATABASE_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
